# truss configuration — all fields are optional, defaults shown below
# Edit to control truss behaviour. Delete any section to use the default.

[gates]
failure_ledger    = true      # check failure ledger before edits
auto_compact      = true      # block prompts once context usage crosses [context] threshold

[context]
context_max = 1000000         # this session's total context window (tokens)
threshold   = 0.6             # fraction of context_max that triggers an auto-compact block

[model]
coordinator = "sonnet"        # advisory: intended session model (truss can't set it)
thinking    = "opus"          # subagent for hard planning analysis
coding      = "haiku"         # baseline for mechanical execution
escalation  = "opus"          # stronger tier on failure (reserved for v1)

[log]
events = true                 # append every tool call to EVENTS.log
